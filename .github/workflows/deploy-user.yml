name: Deploy User Service

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # - name: Authenticate GCP
      #   uses: google-github-actions/auth@v2
      #   with:
      #     credentials_json: '${{ secrets.GCP_SA_KEY }}'
            
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/453481536096/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-deployer@daring-feat-496606-v4.iam.gserviceaccount.com

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: |
          gcloud auth configure-docker asia-south1-docker.pkg.dev

      - name: Build Image
        run: |
          gcloud builds submit services/user \
            --tag asia-south1-docker.pkg.dev/daring-feat-496606-v4/user-repo/user-image:${{ github.sha }}

      - name: Deploy Cloud Run
        run: |
          gcloud run deploy user-service \
            --image asia-south1-docker.pkg.dev/daring-feat-496606-v4/user-repo/user-image:${{ github.sha }} \
            --region asia-south1 \
            --platform managed \
            --allow-unauthenticated \
            --add-cloudsql-instances daring-feat-496606-v4:asia-south1:user-instance \
            --set-env-vars URL="${{ secrets.URL }}" \
            --set-env-vars ECHO="${{ secrets.ECHO }}" \
            --set-env-vars POOL_SIZE="${{ secrets.POOL_SIZE }}" \
            --set-env-vars DEBUG="${{ secrets.DEBUG }}" \
            --set-env-vars FUTURE="${{ secrets.FUTURE }}" \
            --set-env-vars MAX_OVERFLOW="${{ secrets.MAX_OVERFLOW }}" \
            --set-env-vars POOL_RECYCLE="${{ secrets.POOL_RECYCLE }}" \
            --set-env-vars POOL_TIMEOUT="${{ secrets.POOL_TIMEOUT }}"
